<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #07192e;
    }

    body {
      font-family: Inter, Arial, sans-serif;
    }

    .root {
      width: 1280px;
      height: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #07192e;
    }

    .logo {
      position: relative;
      width: 200px;
      height: 202px;
    }

    .layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 200px;
      height: 202px;
      transform-origin: 50% 50%;
    }

    .text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .title {
      font-family: "Courier New", monospace;
      font-size: 28px;
      font-weight: 700;
      color: #e8d5b0;
    }

    .slash {
      color: #2abfaa;
      font-weight: 400;
      font-size: 34px;
    }

    .subtitle {
      font-size: 11px;
      color: #3a6a90;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .barwrap {
      width: 140px;
      height: 2px;
      background: #1a3a55;
      border-radius: 2px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      background: #2abfaa;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="root">
    <div class="logo" id="logo"></div>
    <div class="text">
      <div class="title" id="title">Mood<span class="slash">/</span>DNA</div>
      <div class="subtitle" id="subtitle">Design Intelligence for Designers</div>
      <div class="barwrap" id="barwrap"><div class="bar" id="bar"></div></div>
    </div>
  </div>

  <script>
    const R_LINE = "m 142.3569,38.624422 a 5.8473106,5.8473106 0 0 0 -6.52231,5.085869 c 0,0 -2.18851,13.512755 -10.11994,20.149272 -5.23353,4.379088 -15.22613,13.016605 -24.22577,20.80933 -4.499817,3.896338 -8.739665,7.57355 -11.983466,10.378735 -3.243823,2.80525 -5.820399,4.987602 -5.862319,5.021202 -1.731092,1.38479 -2.500642,2.72223 -3.351756,4.43879 -0.8511,1.7165 -1.543661,3.76011 -1.876465,6.10817 -0.665583,4.69612 0.430027,10.82193 4.982337,15.80112 4.141833,4.5301 12.831779,11.7573 21.391669,18.84225 8.55987,7.0849 17.29735,14.22909 18.15637,15.03756 1.208,1.13701 4.96223,5.32341 8.04936,8.90349 3.08715,3.58001 5.73291,6.75525 5.73291,6.75525 a 5.8473106,5.8473106 0 0 0 8.24349,0.72473 5.8473106,5.8473106 0 0 0 0.73764,-8.23056 c 0,0 -2.70743,-3.22606 -5.86232,-6.88465 -3.15489,-3.65867 -6.53167,-7.56334 -8.89054,-9.78353 -2.70787,-2.54849 -10.22518,-8.50414 -18.71285,-15.52933 -8.48766,-7.02511 -17.641733,-14.91591 -20.214014,-17.72931 -2.161762,-2.36451 -2.310334,-4.31091 -2.031763,-6.2764 0.139285,-0.98282 0.460506,-1.91209 0.776481,-2.54942 0.315986,-0.63742 0.863173,-1.03736 0.18115,-0.49164 1.007145,-0.80571 2.944869,-2.50485 6.198782,-5.31878 3.253934,-2.81393 7.487434,-6.48571 11.983474,-10.378788 8.99209,-7.786174 19.03595,-16.456553 24.08342,-20.679875 12.63052,-10.568422 14.22223,-27.693986 14.22223,-27.693986 a 5.8473106,5.8473106 0 0 0 -5.08582,-6.509366 z";
    const L_UP = "m 71.100421,40.323618 a 5.8473106,5.8473106 0 0 0 -5.639326,6.043369 c 0,0 0.680408,14.330583 12.576364,29.429234 4.268272,5.417556 8.633822,9.780609 12.038789,12.867469 l 9.001701,-7.625296 C 95.995098,78.340812 91.588252,74.09623 87.227474,68.561322 77.302531,55.96433 77.143786,45.966323 77.143786,45.966323 a 5.8473106,5.8473106 0 0 0 -6.043365,-5.642705 z";
    const L_DOWN = "m 98.851266,145.84934 -8.47099,-7.37529 c -3.051717,2.65517 -6.62431,6.07252 -10.131613,10.14193 -11.895956,13.80229 -12.576352,26.90239 -12.576352,26.90239 a 5.8473106,5.3452558 0 0 0 5.639326,5.52635 5.8473106,5.3452558 0 0 0 6.043364,-5.16 c 0,0 0.158759,-9.13818 10.083684,-20.65357 3.310325,-3.84088 6.648649,-7.00287 9.412581,-9.38181 z";
    const VB = "0 0 209.64174 212.09167";
    const TR = "translate(-0.35826296)";
    const clamp = (v, a = 0, b = 1) => Math.max(a, Math.min(b, v));
    const smooth = (x) => x * x * (3 - 2 * x);
    const easeOutBack = (x) => {
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
    };
    const fadeIn = (t, start, dur) => smooth(clamp((t - start) / dur));
    const fadeOut = (t, start, dur) => 1 - smooth(clamp((t - start) / dur));

    const circle = '<circle fill="#0d2540" cx="104.44759" cy="107.90867" r="94.335114"/>';
    const rPath = `<path fill="#ffffff" d="${R_LINE}"/>`;
    const eye = '<ellipse fill="#ffffff" cx="116.15209" cy="113.1982" rx="9.4417152" ry="9.7564392"/>';
    const fish = `<g transform="${TR}">${circle}${rPath}</g>`;
    const eyeOnly = `<ellipse fill="#ffffff" cx="116.15209" cy="113.1982" rx="9.4417152" ry="9.7564392" transform="${TR}"/>`;
    const full = `<g transform="${TR}">${circle}<path fill="#ffffff" d="${L_UP}"/><path fill="#ffffff" d="${L_DOWN}"/>${rPath}${eye}</g>`;

    function makeLayer(inner) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      el.setAttribute("viewBox", VB);
      el.setAttribute("class", "layer");
      el.innerHTML = inner;
      document.getElementById("logo").appendChild(el);
      return el;
    }

    const layers = [
      makeLayer(fish),
      makeLayer(eyeOnly),
      makeLayer(fish),
      makeLayer(eyeOnly),
      makeLayer(full),
    ];

    function setLayer(index, opacity, transform) {
      layers[index].style.opacity = clamp(opacity).toFixed(4);
      layers[index].style.transform = transform;
    }

    function slide(el, t, start, dur) {
      const p = smooth(clamp((t - start) / dur));
      el.style.opacity = p.toFixed(4);
      el.style.transform = `translateY(${(8 * (1 - p)).toFixed(3)}px)`;
    }

    function render(t) {
      setLayer(0, fadeIn(t, 200, 500), "scale(1)");
      const eyeP = clamp((t - 650) / 350);
      setLayer(1, eyeP <= 0 ? 0 : 1, `scale(${(0.1 + 0.9 * Math.min(1.08, easeOutBack(eyeP))).toFixed(4)})`);

      const outP = clamp((t - 1200) / 400);
      setLayer(2, outP <= 0 ? 0 : fadeOut(t, 1200, 400), `scale(${(1 - 0.15 * smooth(outP)).toFixed(4)})`);
      setLayer(3, t < 650 ? 0 : fadeOut(t, 1200, 350), "scale(1)");

      const inP = clamp((t - 1550) / 700);
      let fullScale = 0.85;
      if (inP > 0) {
        fullScale = inP < 0.7
          ? 0.85 + (1.04 - 0.85) * easeOutBack(inP / 0.7)
          : 1.04 + (1 - 1.04) * smooth((inP - 0.7) / 0.3);
      }
      let rotate = 0;
      if (t >= 2250) {
        const p = ((t - 2250) % 8000) / 8000;
        rotate = p < 0.3
          ? 100 * smooth(p / 0.3)
          : p < 0.7
            ? 100 + 160 * smooth((p - 0.3) / 0.4)
            : 260 + 100 * smooth((p - 0.7) / 0.3);
      }
      setLayer(4, inP <= 0 ? 0 : 1, `rotate(${rotate.toFixed(3)}deg) scale(${fullScale.toFixed(4)})`);

      slide(document.getElementById("title"), t, 2000, 500);
      slide(document.getElementById("subtitle"), t, 2200, 400);
      slide(document.getElementById("barwrap"), t, 2300, 400);

      const bp = clamp((t - 2400) / 1200);
      const bw = bp < 0.6
        ? 75 * smooth(bp / 0.6)
        : bp < 0.85
          ? 75 + 15 * smooth((bp - 0.6) / 0.25)
          : 90 + 10 * smooth((bp - 0.85) / 0.15);
      document.getElementById("bar").style.width = `${clamp(bw, 0, 100).toFixed(3)}%`;
    }

    render(Number(new URLSearchParams(location.search).get("t") || "0"));
  </script>
</body>
</html>
